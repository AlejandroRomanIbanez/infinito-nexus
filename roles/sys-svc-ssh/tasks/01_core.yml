---
# May run before the `update` role, so refresh the cache first; raw apt-get
# because the apt module needs python3-apt, which is what's missing on a fresh image.
- name: Refresh apt cache before first install (Debian family)
  ansible.builtin.command: apt-get update
  changed_when: false
  when: ansible_facts['os_family'] == 'Debian'

- name: Install OpenSSH client
  package:
    name: >-
      {{
        ({
          'Debian': 'openssh-client',
          'Ubuntu': 'openssh-client',
          'Archlinux': 'openssh',
          'Fedora': 'openssh-clients',
          'RedHat': 'openssh-clients',
          'CentOS': 'openssh-clients',
          'Alpine': 'openssh-client'
        }).get(ansible_facts['distribution'], 'openssh-client')
      }}
    state: present

- include_tasks: utils/once/flag.yml
