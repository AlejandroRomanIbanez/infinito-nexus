---
- name: "Decidim resolve | Wait for the decidim task to converge"
  ansible.builtin.shell: |
    container service ps {{ lookup('container_service', application_id, 'decidim') | quote }} \
      --filter desired-state=running \
      --format '{{ "{{.CurrentState}}" }}' \
      | head -1 | grep -qE '^Running'
  register: decidim_running_swarm
  changed_when: false
  retries: 600
  delay: 2
  until: decidim_running_swarm.rc == 0

- name: "Decidim resolve | Resolve the hosting node"
  ansible.builtin.shell: |
    container service ps {{ lookup('container_service', application_id, 'decidim') | quote }} \
      --filter desired-state=running \
      --format '{{ "{{.Node}}" }}' | head -1
  register: decidim_swarm_node_query
  changed_when: false

- name: "Decidim resolve | Set DECIDIM_HOST_NODE"
  ansible.builtin.set_fact:
    DECIDIM_HOST_NODE: "{{ decidim_swarm_node_query.stdout | trim }}"

- name: "Decidim resolve | Resolve the local container ID on the hosting node"
  ansible.builtin.shell: |
    container ps \
      --filter "label=com.docker.swarm.service.name={{ lookup('container_service', application_id, 'decidim') }}" \
      --filter status=running \
      --format '{{ "{{.ID}}" }}' | head -1
  register: decidim_local_cid_query
  changed_when: false
  delegate_to: "{{ DECIDIM_HOST_NODE }}"

- name: "Decidim resolve | Set DECIDIM_LOCAL_CID"
  ansible.builtin.set_fact:
    DECIDIM_LOCAL_CID: "{{ decidim_local_cid_query.stdout | trim }}"
