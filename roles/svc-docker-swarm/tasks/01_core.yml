---
- include_tasks: utils/once/flag.yml

# Consumers like `svc-docker-registry` pull this role via `run_after`;
# under universal / server CI they reach it with DEPLOYMENT_MODE='compose'
# and no `svc-docker-swarm-manager` group, which would trip the asserts.
- name: "Bootstrap docker swarm cluster"
  ansible.builtin.include_tasks: 01a_bootstrap_cluster.yml
  when: DEPLOYMENT_MODE == 'swarm'
