---
# Matrix-deploy variant overrides for svc-registry-docker.
# See docs/contributing/artefact/files/role/variants.md for the file format.

# Variant 0: a fresh registry stores nothing until the first push, so the
# volume-backup drill has no payload to verify here; the backup consumer
# stays off and the drill is covered by the app-role variants instead.
- services:
    container_backup:
      enabled: false
      shared: false # nocheck: variants-static-override backup shared stays literally true
