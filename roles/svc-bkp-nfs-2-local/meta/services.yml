---
nfs-server:
  enabled: "{{ 'svc-storage-nfs-server' in group_names }}"
  shared: "{{ 'svc-storage-nfs-server' in group_names }}"
  bond: 1
nfs-2-local:
  bond: 1
  enabled: true
  shared: true
  preload: false
  provides: nfs_backup
  run_after:
    - svc-storage-nfs-server
  lifecycle: beta
  skip:
    - compose
    - swarm
  min_storage: 0GB
  cpus: "0.5"
  mem_reservation: "256m"
  mem_limit: "512m"
  pids_limit: 256
