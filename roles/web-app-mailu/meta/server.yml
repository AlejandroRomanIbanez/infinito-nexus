---
status_codes:
  default:
    - 301
    - 200
# DEPRECATED — web-app-stalwart owns `mail.`; Mailu keeps a legacy domain for rollback.
domains:
  canonical:
    - legacy-mail.{{ DOMAIN_PRIMARY }}
  aliases: []
csp:
  flags:
    style-src-attr:
      unsafe-inline: true
    script-src-elem:
      unsafe-inline: true
    script-src-attr:
      unsafe-inline: true
      unsafe-eval: true
networks:
  local:
    subnet: 192.168.102.16/28
    dns_resolver: 192.168.102.29
