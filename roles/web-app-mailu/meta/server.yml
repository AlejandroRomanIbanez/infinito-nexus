---
status_codes:
  default:
    - 301
    - 200
# Owns `mail.` only when selected as the active provider; otherwise it parks on a
# legacy domain so it never collides with the default (web-app-stalwart).
domains:
  canonical:
    - "{{ ('mail.' ~ DOMAIN_PRIMARY) if MAIL_PROVIDER == 'web-app-mailu' else ('legacy-mail.' ~ DOMAIN_PRIMARY) }}"
  aliases: []
csp:
  flags:
    style-src-attr:
      unsafe-inline: true
    script-src-elem:
      unsafe-inline: true
    script-src-attr:
      unsafe-inline: true
      unsafe-eval: true
networks:
  local:
    subnet: 192.168.102.16/28
    dns_resolver: 192.168.102.29
