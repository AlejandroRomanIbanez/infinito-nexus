---
# Refresh-or-defer: heviat-Mailu caches a failed OIDC discovery until the admin
# container restarts, and Keycloak loads after the mail roles on fresh rounds.

- name: "Probe the OIDC issuer from the Mailu admin container"
  ansible.builtin.command:
    argv:
      - "{{ BIN_COMPOSE }}"
      - exec
      - -T
      - admin
      - curl
      - -ksS
      - -o
      - /dev/null
      - -w
      - "%{http_code}"
      - "https://{{ MAILU_OIDC_HOST }}/realms/{{ OIDC.CLIENT.REALM }}/.well-known/openid-configuration"
  args:
    chdir: "{{ MAILU_INSTANCE_DIR }}"
  register: mailu_oidc_issuer_probe
  changed_when: false
  failed_when: false

- name: "Refresh the OIDC provider config now (issuer reachable)"
  include_tasks: 08_oidc_refresh.yml
  when: mailu_oidc_issuer_probe.stdout | default('') == '200'

- name: "Defer the OIDC refresh until the issuer is deployed"
  ansible.builtin.set_fact:
    mailu_oidc_restart_pending: true
  when: mailu_oidc_issuer_probe.stdout | default('') != '200'

- name: "Queue the deferred refresh for the service-loader post-load flush"
  include_role:
    name: sys-service-loader
    tasks_from: list_or_shoot.yml
  vars:
    list_or_shoot_roles:
      - web-app-mailu
  when: mailu_oidc_restart_pending | default(false) | bool
