---
# 'flask mailu alias' is create-only: an existing alias keeps its old
# destination (the duplicate error is tolerated below). Changing a user's
# 'forward' therefore requires deleting the alias in Mailu first.
- name: "Ensure Mailu alias '{{ mailu_alias_localpart }}@{{ MAILU_DOMAIN }}' forwards to '{{ mailu_alias_destination }}'"
  ansible.builtin.command:
    argv:
      - "{{ BIN_COMPOSE }}"
      - exec
      - -T
      - admin
      - flask
      - mailu
      - alias
      - "{{ mailu_alias_localpart }}"
      - "{{ MAILU_DOMAIN }}"
      - "{{ mailu_alias_destination }}"
  args:
    chdir: "{{ MAILU_INSTANCE_DIR }}"
  register: mailu_alias_result
  retries: 12
  delay: 10
  until: >
    mailu_alias_result.rc == 0 or
    ('exists' in (mailu_alias_result.stderr | lower)) or
    ('already' in (mailu_alias_result.stderr | lower)) or
    ('duplicate' in (mailu_alias_result.stderr | lower))
  changed_when: mailu_alias_result.rc == 0
  failed_when: >
    mailu_alias_result.rc != 0 and
    (
      ('exists' not in (mailu_alias_result.stderr | lower)) and
      ('already' not in (mailu_alias_result.stderr | lower)) and
      ('duplicate' not in (mailu_alias_result.stderr | lower))
    )
