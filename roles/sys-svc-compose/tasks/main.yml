---
- include_tasks: 01_core.yml
  when: run_once_sys_svc_compose is not defined

- name: "Route docker cleanup/health deps through service-loader"
  ansible.builtin.include_role:
    name: sys-service-loader
    tasks_from: list_or_shoot.yml
  vars:
    list_or_shoot_roles:
      - sys-ctl-cln-docker
      - sys-ctl-hlth-container
      - sys-ctl-hlth-volumes
      - sys-ctl-rpr-container-hard

- name: "Route svc-bkp-container-2-local through service-loader (when deployed)"
  ansible.builtin.include_role:
    name: sys-service-loader
    tasks_from: list_or_shoot.yml
  vars:
    list_or_shoot_roles:
      - svc-bkp-container-2-local
  when: "'svc-bkp-container-2-local' in group_names"

- name: "Stack-host-only prep (dirs, repo, files, CA trust) for '{{ application_id }}'"
  include_tasks: "02_stack_host_prep.yml"
  when: IS_STACK_HOST | bool

- name: "Prepare NFS subdirs for '{{ application_id }}' (wipe stale in dev/act, then pre-create; swarm + NFS only)"
  include_tasks:
    file: "utils/nfs_prep.yml"
    apply:
      delegate_to: "{{ (groups['svc-storage-nfs-server'] | default([]))[0] | default(inventory_hostname) }}"
      run_once: true
  when:
    - DEPLOYMENT_MODE == 'swarm'
    - (storage.backend | default('local')) == 'nfs'
    - (groups['svc-storage-nfs-server'] | default([])) | length > 0
    - application_id not in lookup('roles_with_default_placement', 'manager')

- name: "Ensure that {{ lookup('container', application_id, 'directories.instance') }} is up"
  include_tasks: "utils/up.yml"
  when: IS_STACK_HOST | bool
