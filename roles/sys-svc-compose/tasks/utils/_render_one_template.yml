---
- name: "Render '{{ _tpl.dest }}'"
  ansible.builtin.template:
    src: "{{ _tpl.src }}"
    dest: "{{ _tpl.dest }}"
    owner: "{{ _tpl.owner | default('root') }}"
    group: "{{ _tpl.group | default('root') }}"
    mode: "{{ _tpl.mode | default('0640') }}"
  when: (_tpl.when | default(true)) | bool
  no_log: "{{ MASK_CREDENTIALS_IN_LOGS | bool }}"
  register: _role_templates_render
  notify: "{{ _tpl.notify | default(['compose up']) }}"
