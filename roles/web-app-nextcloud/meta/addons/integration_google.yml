---
enabled: "{{ (lookup('api', 'google.client_id') | length > 0) and (lookup('api', 'google.client_secret') | length > 0) }}"
required: true
mechanism: plugin
source: upstream
config:
  plugin_configuration:
    - appid: "integration_google"
      configkey: "client_id"
      configvalue: "{{ lookup('api', 'google.client_id') }}"
    - appid: "integration_google"
      configkey: "client_secret"
      configvalue: "{{ lookup('api', 'google.client_secret') }}"
