---
enabled: "{{ lookup('config', 'web-app-nextcloud', 'services.peertube.enabled') | bool }}"
required: true
mechanism: plugin
source: upstream
bridges:
  - peertube
config:
  plugin_configuration:
    - appid: "integration_peertube"
      configkey: "instances"
      configvalue: "{{ lookup('tls', 'web-app-peertube', 'url.base') }}"
