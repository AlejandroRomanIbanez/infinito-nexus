---
- include_tasks: utils/once/flag.yml

- name: Include dependencies
  include_role:
    name: "sys-hostname"
  when: not (run_once_sys_hostname | default(false) | bool)

- name: "Assert the mail provider was preloaded before configuring external mail"
  ansible.builtin.assert:
    that:
      - "('run_once_' ~ (MAIL_PROVIDER | replace('-', '_'))) in vars"
    fail_msg: >-
      {{ MAIL_PROVIDER }} must be preloaded by sys-service-loader before
      sys-svc-mail runs. Missing run_once_{{ MAIL_PROVIDER | replace('-', '_') }}
      indicates that a service was loaded outside the constructor
      service-loader path.
  when:
    - MAIL_PROVIDER in group_names

# The no-reply submission token is created during mail-provider provisioning. On
# local/CI deploys the mail domain uses a reserved TLD (.example) which Stalwart
# rejects, so provisioning is skipped and the token is absent — warn instead of
# failing the whole deploy.
- name: "Warn if the no-reply submission token is missing"
  ansible.builtin.debug:
    msg: >-
      users['no-reply'].tokens['{{ MAIL_PROVIDER }}'] is empty — outbound mail
      will not authenticate until the no-reply account is provisioned (expected
      on local/CI reserved-TLD domains).
  when:
    - MAIL_PROVIDER in group_names
    - (lookup('users', 'no-reply').tokens | default({})).get(MAIL_PROVIDER, '') | length == 0

- name: Setup emails via localhost
  include_role:
    name: sys-svc-mail-smtp
  when:
    - run_once_sys_svc_mail_smtp is not defined
    - not (lookup('email').external | bool)

- name: Setup msmtp client
  include_role:
    name: sys-svc-mail-msmtp
  when:
    - run_once_sys_svc_mail_msmtp is not defined
