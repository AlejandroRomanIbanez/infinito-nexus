---
- include_role:
    name: sys-service
  vars:
    system_service_tpl_on_failure: "{{ SYS_SERVICE_ON_FAILURE_COMPOSE }}"
    system_service_on_calendar: "{{ SYS_SCHEDULE_HEALTH_MSMTP }}"
    system_service_timer_enabled: true
    system_service_tpl_environment:
      - "MAIL_RECIPIENT={{ lookup('mail_recipient') }}"
      - "MAIL_TIMEOUT={{ lookup('email').timeout }}"

    # Force early check if mail sending works — but never during shared-service
    # preloading: the mail provider's final TLS listener (platform cert) is only
    # registered after this role's include chain returns (web-app-stalwart
    # 07_tls), so an instant strict-TLS send would hit the built-in bootstrap
    # certificate and fail. The alm-compose self-test covers the send in the
    # normal app phase (same guard, same reason).
    system_service_force_flush_instant: "{{ (MODE_DEBUG | bool) and not (_service_loader_preloading | default(false) | bool) }}"
    system_service_force_flush_final: false
- include_tasks: utils/once/flag.yml
