---
status_codes:
  # 302: both canonicals redirect unauthenticated HEADs — the WebAdmin SPA to
  # /account/login, and Roundcube straight to Keycloak (oauth_login_redirect).
  default:
    - 302
    - 301
    - 200
domains:
  canonical:
    - mail.{{ DOMAIN_PRIMARY }}
    - webmail.{{ DOMAIN_PRIMARY }}
  aliases: []
csp:
  flags:
    style-src-attr:
      unsafe-inline: true
    script-src-elem:
      unsafe-inline: true
    script-src-attr:
      unsafe-inline: true
      unsafe-eval: true
  whitelist:
    # The WebAdmin SPA does its OIDC code->token exchange as a browser-side fetch
    # to Keycloak, so that origin must be allowed in connect-src (else "Failed to fetch").
    connect-src:
      - "{{ lookup('tls', 'web-app-keycloak', 'url.base') | regex_replace('/+$', '') }}"
networks:
  local:
    subnet: 192.168.105.208/28
