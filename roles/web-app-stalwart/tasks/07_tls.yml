---
# Deploy the platform TLS cert (cert.pem/key.pem) into Stalwart's cert dir and
# register it for the mail listeners. x:Certificate references the mounted files
# (validated format). SNI matches it to the domain automatically.
- name: "Deploy the platform TLS certificate into Stalwart's cert dir"
  include_role:
    name: sys-ctl-mtn-cert-deploy

- name: "Check for an existing Stalwart certificate"
  include_tasks: jmap_call.yml
  vars:
    stalwart_jmap_body: >-
      {{ {'using': ['urn:ietf:params:jmap:core', 'urn:stalwart:jmap'],
          'methodCalls': [['x:Certificate/get', {'ids': none}, 'c0']]} | to_json }}

- name: "Register the platform TLS certificate with Stalwart"
  include_tasks: jmap_call.yml
  vars:
    stalwart_jmap_body: >-
      {{ {'using': ['urn:ietf:params:jmap:core', 'urn:stalwart:jmap'],
          'methodCalls': [['x:Certificate/set', {'create': {'c': {
            'certificate': {'@type': 'File', 'filePath': '/etc/stalwart/certs/cert.pem'},
            'privateKey': {'@type': 'File', 'filePath': '/etc/stalwart/certs/key.pem'}
          }}}, 'c0']]} | to_json }}
  when: (stalwart_jmap.methodResponses[0][1].list | length) == 0
