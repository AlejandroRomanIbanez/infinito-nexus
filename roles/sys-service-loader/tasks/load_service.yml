---
- name: "🔌 Load {{ service_key }} in shared service preload context"
  block:
    - name: "▶️ Run shared service preload for {{ service_key }}"
      include_tasks: preload_service.yml
  always:
    - name: "🧹 Clear shared service preload context for {{ service_key }}"
      ansible.builtin.set_fact:
        service_loader_preloading: false
      changed_when: false
