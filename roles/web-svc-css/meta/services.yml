---
# nocheck: playwright-service-flag — self-provider
css:
  enabled: true
  shared: true
  cpus: "0.2"
  mem_reservation: 128m
  mem_limit: 256m
  pids_limit: 128
  min_storage: "1GB"
  lifecycle: beta
# nocheck: playwright-service-flag — provider role; no consumer surface to gate
# nocheck: dynamic-flag
cdn:
  enabled: true
  shared: true
# nocheck: playwright-service-flag — provider role; no consumer surface to gate
# nocheck: dynamic-flag
matomo:
  enabled: false
  shared: false
prometheus:
  enabled: "{{ 'web-app-prometheus' in group_names }}"
  shared: "{{ 'web-app-prometheus' in group_names }}"
