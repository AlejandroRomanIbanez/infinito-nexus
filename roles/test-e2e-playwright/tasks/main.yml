---
- name: Show detected Playwright roles
  ansible.builtin.debug:
    msg: "Playwright-enabled roles: {{ TEST_E2E_PLAYWRIGHT_APPS }}"
  changed_when: false

- name: Playwright orchestration (only on the host where the stack lives)
  ansible.builtin.include_tasks: 01a_orchestrate.yml
  when: IS_STACK_HOST | bool
