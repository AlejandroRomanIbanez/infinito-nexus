---
- name: Update DB host
  ansible.builtin.shell: >
    container exec --user root {{ MATOMO_LOCAL_CID | quote }}
    sed -i "s/^host *=.*/host = {{ lookup('database', application_id, 'host') | sed_escape('/') }}/" {{ MATOMO_CONFIG }}
  delegate_to: "{{ MATOMO_HOST_NODE }}"
  notify: compose up

- name: Update DB name
  ansible.builtin.shell: >
    container exec --user root {{ MATOMO_LOCAL_CID | quote }}
    sed -i "s/^dbname *=.*/dbname = {{ lookup('database', application_id, 'name') | sed_escape('/') }}/" {{ MATOMO_CONFIG }}
  delegate_to: "{{ MATOMO_HOST_NODE }}"
  notify: compose up

- name: Update DB user
  ansible.builtin.shell: >
    container exec --user root {{ MATOMO_LOCAL_CID | quote }}
    sed -i "s/^username *=.*/username = {{ lookup('database', application_id, 'username') | sed_escape('/') }}/" {{ MATOMO_CONFIG }}
  delegate_to: "{{ MATOMO_HOST_NODE }}"
  notify: compose up

- name: Update DB password
  ansible.builtin.shell: >
    container exec --user root
    -e PATCH_PASSWORD={{ lookup('database', application_id, 'password') | sed_escape('/') | quote }}
    {{ MATOMO_LOCAL_CID | quote }}
    sh -c "sed -i \"s/^password *=.*/password = \${PATCH_PASSWORD}/\" {{ MATOMO_CONFIG }}"
  delegate_to: "{{ MATOMO_HOST_NODE }}"
  no_log: "{{ MASK_CREDENTIALS_IN_LOGS | bool }}"
  notify: compose up
