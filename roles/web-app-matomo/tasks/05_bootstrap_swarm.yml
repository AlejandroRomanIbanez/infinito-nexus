---
- name: "Matomo bootstrap | Swarm: wait for Matomo to be healthy before running the installer"
  ansible.builtin.shell: >
    container inspect -f '{{ "{{" }}.State.Health.Status{{ "}}" }}'
    {{ MATOMO_LOCAL_CID | quote }}
  register: matomo_health_preboot
  changed_when: false
  retries: 60
  delay: 2
  until: matomo_health_preboot.rc == 0 and (matomo_health_preboot.stdout | trim) == 'healthy'
  delegate_to: "{{ MATOMO_HOST_NODE }}"

- name: "Matomo bootstrap | Swarm: re-run the bootstrap service against the now-healthy Matomo"
  ansible.builtin.command: >-
    container service update --force
    {{ matomo_bootstrap_service_ref }}
  changed_when: true
  timeout: 600

- name: "Matomo bootstrap | Swarm: wait for the bootstrap service to emit a token"
  ansible.builtin.shell: |
    container service logs --no-task-ids \
      {{ matomo_bootstrap_service_ref | quote }} 2>&1 \
      | sed -E 's/^[^|]*\| //' \
      | grep -oE '^[a-f0-9]{32,64}$' | tail -1
  register: matomo_bootstrap_swarm
  changed_when: false
  no_log: "{{ MASK_CREDENTIALS_IN_LOGS | bool }}"
  retries: 45
  delay: 10
  until: (matomo_bootstrap_swarm.stdout | length) > 0
