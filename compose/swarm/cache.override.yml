# Optional swarm-node package-cache wiring; 01_bootstrap.sh passes it only when a
# package-cache-frontend is running (local/act), so CI without a cache is unaffected.
---
x-cache: &cache
  # Exception: HTTP-only mirrors, mirroring compose.py `_CACHE_HTTP_HOSTNAMES`.
  # Image builds on these DinD nodes inherit this /etc/hosts (proven twice:
  # openresty `apk add` via dl-cdn, simpleicons `npm install` via
  # registry.npmjs.org), and builds have neither the frontend CA nor any
  # skip-cert config, so every HTTPS-defaulting hijack here fails them with an
  # untrusted-cert error. HTTPS package caching for builds needs the CA baked
  # into each Dockerfile and is deliberately out of scope, exactly as in
  # compose mode.
  extra_hosts:
    - "deb.debian.org:${INFINITO_CACHE_PACKAGE_FRONTEND_IP}"
    - "archive.ubuntu.com:${INFINITO_CACHE_PACKAGE_FRONTEND_IP}"
    - "security.ubuntu.com:${INFINITO_CACHE_PACKAGE_FRONTEND_IP}"
  volumes:
    - ../package-cache/apt.list:/etc/apt/sources.list.d/package-cache.list:ro

services:
  nfs-server:
    <<: *cache
  swarm-mgr-01:
    <<: *cache
  swarm-wrk-01:
    <<: *cache
  swarm-wrk-02:
    <<: *cache
  backup-host:
    <<: *cache
