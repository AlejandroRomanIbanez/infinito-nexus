---
DEPLOYMENT_MODE: "{{ 'swarm' if (groups[application_id] | default([]) | length) > 1 else 'compose' }}"

SWARM_CLUSTER_AVAILABLE: "{{ (groups['svc-docker-swarm'] | default([]) | length) > 0 }}"

swarm:
  manager:
    advertise_addr: ""
  network:
    encryption: true
  registry:
    host: "{{ (groups['svc-docker-swarm-manager'] | default([]))[0] | default('') }}"
    port: 5000

SWARM_REGISTRY_PREFIX: >-
  {{
    (swarm.registry.host ~ ':' ~ swarm.registry.port ~ '/')
    if (
      DEPLOYMENT_MODE == 'swarm'
      and (swarm.registry.host | length > 0)
    )
    else ''
  }}
