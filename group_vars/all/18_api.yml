---
# Central SPOT for proprietary / external (non-self-hosted) API credentials.
# Each entry is empty by default; an integration that depends on a provider is
# only activated when its credentials are present (see the addons that gate
# their `enabled` on `API.<provider>`). Override per provider in the (vault-
# encrypted) inventory; access ONLY via lookup('api', '<provider>.<key>').
# nocheck: unused-var: consumed by the api lookup plugin (plugins/lookup/api.py) via lookup('api', ...), not referenced directly in YAML/Jinja.
API:
  cloudflare:
    api_token: ""
  telegram:
    bot_token: ""
    api_id: ""
    api_hash: ""
  github:
    client_id: ""
    client_secret: ""
  google:
    client_id: ""
    client_secret: ""
  jira:
    client_id: ""
    client_secret: ""
