name: "🧹 Lint"

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: 🧹 Lint
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      INFINITO_LINT_RUNNER: host
    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v7.0.0

      - name: 🔧 Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: 🧹 Run all lint checks via make
        shell: bash
        run: |
          set -euo pipefail
          make lint 2>&1 | tee /tmp/lint-output.txt

      - name: 🔨 Build step summary from annotations
        if: always()
        working-directory: ${{ github.workspace }}
        run: |
          python3 -m utils.annotations.summarize /tmp/lint-output.txt "Lint Annotation Summary"

  dockerfile:
    name: 🧹 Lint Dockerfile
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v7.0.0
      - name: ▶️ Run hadolint (produce SARIF)
        id: hadolint
        continue-on-error: true
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5
        with:
          dockerfile: ./Dockerfile
          format: sarif
          output-file: hadolint-results.sarif
          failure-threshold: warning

      - name: ⬆️ Upload analysis results to GitHub
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: hadolint-results.sarif
          wait-for-processing: true
          category: hadolint

      - name: 🛑 Fail if SARIF contains warnings/errors
        if: always()
        run: python3 utils/docker/hadolint.py hadolint-results.sarif
